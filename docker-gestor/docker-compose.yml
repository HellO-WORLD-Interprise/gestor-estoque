services:
  db:
    image: postgres:15-alpine
    container_name: gestoq-db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=PSQL@1234567890
      - POSTGRES_DB=gestoq_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../database/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  api:
    build:
      context: ../api
      dockerfile: ./docker/Dockerfile
    container_name: gestoq-api
    command: npm run start:dev -- --outDir /tmp/dist
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:PSQL@1234567890@db:5432/gestoq_db
      
    volumes:
      - ../api:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - app-network

  app:
    build:
      context: ../app
      dockerfile: ./docker/Dockerfile
    container_name: gestoq-app
    ports:
      - "5173:5173"
    volumes:
      - ../app:/app
      - /app/node_modules
    stdin_open: true
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg_data: